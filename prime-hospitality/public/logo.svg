<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Solid bright green background (iOS app icon style) -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#22C55E"/>

  <!-- Clean, modern white shield outline -->
  <!-- Top points: (256, 280) to (512, 220) to (768, 280) -->
  <!-- Bottom point: (512, 820) -->
  <path
    d="M 256 300
       Q 512 240 768 300
       C 768 600 650 780 512 840
       C 374 780 256 600 256 300 Z"
    fill="none"
    stroke="white"
    stroke-width="56"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Bold white "PBG" letters -->
  <!-- Centered inside the shield -->
  <text 
    x="512" 
    y="590" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-weight="900" 
    font-size="260" 
    fill="white" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="4"
  >PBG</text>
</svg>
